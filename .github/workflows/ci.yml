name: Pull request CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  journey-validation:
    name: Offline journey validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out the pinned release-evidence schema
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: AtlasReaper311/atlas-infra
          ref: 8d1ca6625711f76ccd9b6ebf40bf8ebebfac1232
          path: .atlas-infra
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install declared dependencies and Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run deterministic offline suites
        env:
          ATLAS_INFRA_ROOT: ${{ github.workspace }}/.atlas-infra
        run: |
          npm run check
          npm run test:unit
          npm run test:offline
          node scripts/release-watch.mjs verify \
            --request tests/fixtures/release-watch/request.json \
            --metadata-file tests/fixtures/release-watch/metadata.match.json \
            --journey tests/fixtures/release-watch/journey.passed.json \
            --fixture \
            --output "$RUNNER_TEMP/release-evidence.json"
          python3 .atlas-infra/scripts/validate_release_evidence.py \
            --instance "$RUNNER_TEMP/release-evidence.json"
