name: Dependabot review policy

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: dependabot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    uses: AtlasReaper311/atlas-infra/.github/workflows/dependabot-review.yml@8e6d08701823b02c4859bfc72af67fc8ace1f4b5
    with:
      automerge_enabled: ${{ vars.DEPENDABOT_AUTOMERGE_ENABLED == 'true' }}
