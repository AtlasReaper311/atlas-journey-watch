name: Estate journey watch

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: estate-journey-watch
  cancel-in-progress: false

jobs:
  journeys:
    name: Public estate journeys
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run synthetic journeys
        id: journeys
        run: npm test

      - name: Upload failure evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: journey-evidence-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 30

      - name: Report one consolidated failure
        if: failure()
        continue-on-error: true
        env:
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify.mjs
