name: Estate journey watch

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: estate-journey-watch
  cancel-in-progress: false

jobs:
  journeys:
    name: Public estate journeys
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run synthetic journeys
        id: journeys
        run: npm test

      - name: Upload failure evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: journey-evidence-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 30

      - name: Report one consolidated failure
        if: failure()
        continue-on-error: true
        env:
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify.mjs
